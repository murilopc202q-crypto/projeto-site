<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login de conta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="body-login">

    <div  class="card-login">
        <article class="login">
           <h1>Login</h1>
                          
                  <form class="form-login" action="cardapio.html" method="get"> 

                    <div class="grupo-input">
                      <label for="nome-login">NOME:</label>
                       <input type="text"  id="nome"  name="nome" >
                    </div>

                    <div class="grupo-input">
                      <label for="senha-login">SENHA:</label>
                        <input type="password"  id="password"  name="password" >
                       <button class="button-login" type="submit">Acessar</button>
                    </div>
                    
                    <div>
                       <p> Não tenho uma conta:</p>
                       <a href="cadastro.html" class="button-cadastro">Cadastre-se</a>
                    </div>
                  </form>
        </article>
    </div>
    
</body>
</html>
