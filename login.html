<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login de conta</title>  <link rel="stylesheet" href="/css/style.css"> 
</head>
<body>

    <div  class="card-login">
        <article class="login">
           <h1>Login</h1>
                          
                  <form class="form-login" action="/index.html/pages/cardapio.html" method="get"> 

                    <div class="grupo-input">
                      <label for="nome-login">NOME:</label>
                       <input type="text"  id="nome"  name="nome" required>
                    </div>

                    <div class="grupo-input">
                      <label for="senha-login">SENHA:</label>
                        <input type="password"  id="password"  name="password" required>
                       <button class="button-login" type="submit">Acessar</button>
                    </div>
                    
                    <div>
                       <p> Não tenho uma conta:</p>
                       <button class=" button-cadastro"> <a href="/index.html/pages/cadastro.html">Cadastre-se</a></button>
                    </div>
                  </form>
        </article>
    </div>
    
</body>
</html>
